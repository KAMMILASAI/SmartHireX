spring.application.name=smarthirex
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Timezone Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smarthirex?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration (consolidated)
# Keep schema changes under Flyway/manual SQL to avoid runtime DDL warnings on partial schemas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



# JWT Configuration
app.jwt.secret=${JWT_SECRET:SmartHireX_Default_Dev_JWT_Secret_Key_AtLeast32Chars_2026}
app.jwt.expiration-ms=86400000
app.jwt.token-prefix=Bearer 
app.jwt.header-string=Authorization

# OAuth2 Configuration
app.oauth2.authorizedRedirectUris=http://localhost:5173/oauth2/redirect
app.oauth2.cookie-expire-seconds=180
app.oauth2.redirect-uri=http://localhost:5173/oauth2/redirect

# Email Configuration (consolidated)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Contact Form Configuration
app.contact.admin-email=admin@smarthirex.com
app.frontend.url=http://localhost:5173

# File Upload Configuration
app.upload.dir=uploads
app.max-file-size=1MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

app.frontend-url=http://localhost:5173

# Logging
logging.level.root=INFO
logging.level.com.smarthire=DEBUG

# Admin email
admin.email=smarthirex1@gmail.com
admin.default-password=${ADMIN_DEFAULT_PASSWORD:}
app.admin.reset-password-on-startup=false
app.admin.ensure-default-password=true

# Support UPI
support.upi=saikammila1432@axl
# Cloudinary configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini API Key
gemini.api-key=${GEMINI_API_KEY:}

# Judge0 API Configuration (Remote Code Execution)
judge0.api-url=https://judge0-ce.p.rapidapi.com
judge0.rapidapi-key=${JUDGE0_RAPIDAPI_KEY:}
judge0.rapidapi-host=judge0-ce.p.rapidapi.com

# Update CORS allowed origins
cors.allowed-origins=http://localhost:5173

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true
spring.flyway.ignore-missing-migrations=true
spring.flyway.ignore-failed-future-migration=true